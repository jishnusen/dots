#################################
#     GLX backend
#################################
backend = "glx";
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
vsync = true;
glx-swap-method = -1;

#################################
#       Shadows
#################################
shadow = false;
shadow-radius = 5;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-opacity = 0.2;
shadow-ignore-shaped = false;

#################################
#       Opacity
#################################
#inactive-opacity = 1;
active-opacity = 1;
frame-opacity = 0.8;
inactive-opacity-override = false;
# blur-background = true;
# blur-background-frame = true;
# blur-background-fixed = true;
# blur-background-exclude = [
#     "window_type = 'dock'",
#     "window_type = 'desktop'"
# ];
# blur-kern = "3x3box";
# blur-method = "dual_kawase";
# blur-strength = 10;
blur-method = "dual_kawase";
blur-strength = 10;
blur-background = true;
no-dnd-blur = true;
blur-background-exclude = [
#   "! name~=''",
    "name = 'Notification'",
    # "class_g = 'firefox' && window_type = 'utility'",
    "window_type = 'menu'",
    "_GTK_FRAME_EXTENTS@:c",
    "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'"
];

#################################
#       Fading
#################################
fading = true;
fade-delta = 3;

wintypes:
{
  dock = { shadow = false; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 1.0; }
  dropdown_menu = { opacity = 1.0; }
}
